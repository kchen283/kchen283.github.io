<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="4900_10_06.jpg">
    <script src="https://kit.fontawesome.com/28ce45e6c4.js" crossorigin="anonymous"></script>
    <link href="calculatorStyle.css" rel="stylesheet">
    <script src="calculatorScript.js" defer></script>
  </head>

  <body>

    <div class="topnav">
        <a href="//keri-chen.com"> <img class = "headerimg" src="../images/K (2).png"> </a>
    
        <div class="topnav-right">
            <a href="//keri-chen.com/#about">About</a>
            <a href="//keri-chen.com/#projects">Projects</a>
            <a href="//keri-chen.com">Home</a>
        </div>
      </div>

    <h1 style = "text-align: center;"> Calculator </h1>

    <div class="calculator-grid">
    <div class="output">
    <div data-previous-operand class="previous-operand"></div>
    <div data-current-operand class="current-operand"></div>
    </div>
    <button data-all-clear class="span-two">AC</button>
    <button data-delete>DEL</button>
    <button data-operation>÷</button>
    <button data-number>1</button>
    <button data-number>2</button>
    <button data-number>3</button>
    <button data-operation>*</button>
    <button data-number>4</button>
    <button data-number>5</button>
    <button data-number>6</button>
    <button data-operation>+</button>
    <button data-number>7</button>
    <button data-number>8</button>
    <button data-number>9</button>
    <button data-operation>-</button>
    <button data-number>.</button>
    <button data-number>0</button>
    <button data-equals class="span-two">=</button>

    </div>

  </body>
</html>
